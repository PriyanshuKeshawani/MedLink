<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedLink Home Preview</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- React & Tailwind (via CDN for preview) -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --primary: #0077b6;
            --primary-light: #00b4d8;
            --primary-dark: #03045e;
            --accent: #90e0ef;
            --background: #f8f9fa;
            --surface: #ffffff;
            --text: #1b263b;
            --text-muted: #4a5568;
            --success: #38b000;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--background);
            color: var(--text);
            margin: 0;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }

        .text-gradient {
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .gradient-bg {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { motion, AnimatePresence } = window.Motion;

        // Icons placeholder (since lucide-react CDN is tricky, we'll use SVGs or font)
        const Icon = ({ name, size = 24, color = "currentColor" }) => {
            return <i data-lucide={name} style={{ width: size, height: size, color: color }}></i>;
        };

        const Navbar = () => (
            <nav className="glass-card fixed top-4 left-1/2 -translate-x-1/2 w-[calc(100%-2rem)] max-w-6xl z-[1000] px-6 py-3 flex justify-between items-center">
                <div className="flex items-center gap-2 text-2xl font-bold text-[#0077b6]">
                    <div className="p-2 bg-[#0077b6] rounded-xl text-white">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
                    </div>
                    MedLink
                </div>
                <div className="hidden md:flex gap-8 items-center font-medium">
                    <a href="#">Home</a>
                    <a href="#">Services</a>
                    <a href="#">Find Doctors</a>
                    <button className="bg-[#0077b6] text-white px-5 py-2 rounded-xl font-semibold shadow-lg">Get Started</button>
                </div>
            </nav>
        );

        const Hero = () => (
            <section className="min-h-screen flex items-center pt-20 px-4 max-w-6xl mx-auto relative overflow-hidden">
                <div className="max-w-xl">
                    <motion.div 
                        initial={{ opacity: 0, y: 20 }}
                        animate={{ opacity: 1, y: 0 }}
                        transition={{ duration: 0.6 }}
                    >
                        <span className="bg-[#90e0ef] text-[#03045e] px-4 py-1.5 rounded-full text-sm font-semibold mb-6 inline-block">
                            Healthcare Beyond Hospitals
                        </span>
                        <h1 className="text-5xl md:text-6xl font-bold mb-6 leading-tight">
                            Your Personal Doctor, <span className="text-gradient">Right at Your Doorstep</span>
                        </h1>
                        <p className="text-lg text-gray-600 mb-10 leading-relaxed">
                            Book professional medical services like checkups, nursing, and consultations from the comfort of your home. Reducing hospital visits, improving lives.
                        </p>
                        <div className="flex gap-4">
                            <button className="bg-[#0077b6] text-white px-8 py-4 rounded-2xl font-bold flex items-center gap-2 shadow-xl hover:scale-105 transition-transform">
                                Book a Visit 
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14m-7-7 7 7-7 7"/></svg>
                            </button>
                            <button className="bg-white text-[#0077b6] border-2 border-[#0077b6] px-8 py-4 rounded-2xl font-bold hover:bg-[#f0f9ff] transition-colors">
                                Join as Pro
                            </button>
                        </div>
                    </motion.div>
                </div>
                
                <div className="hidden lg:flex flex-1 justify-end relative">
                    <motion.div 
                        initial={{ opacity: 0, scale: 0.8 }}
                        animate={{ opacity: 1, scale: 1 }}
                        transition={{ duration: 0.8, delay: 0.2 }}
                        className="glass-card w-[450px] h-[550px] overflow-hidden"
                    >
                        <img 
                            src="https://images.unsplash.com/photo-1576091160550-2173dba999ef?auto=format&fit=crop&q=80&w=800" 
                            className="w-full h-full object-cover"
                        />
                    </motion.div>
                    
                    <motion.div 
                        initial={{ x: 50, opacity: 0 }}
                        animate={{ x: 0, opacity: 1 }}
                        transition={{ delay: 0.5 }}
                        className="glass-card absolute bottom-10 -left-10 p-5 flex items-center gap-4 bg-white/90"
                    >
                        <div className="bg-teal-50 text-teal-600 p-3 rounded-xl">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
                        </div>
                        <div>
                            <div className="text-xl font-bold">2.5k+</div>
                            <div className="text-xs text-gray-500">Daily Consultations</div>
                        </div>
                    </motion.div>
                </div>
            </section>
        );

        const Services = () => {
            const services = [
                { title: 'General Checkup', desc: 'Routine health monitoring and consultations.' },
                { title: 'Nursing Care', desc: 'Professional nursing services at your home.' },
                { title: 'Wound Dressing', desc: 'Sterile and expert wound care management.' },
                { title: 'Sugar/BP Monitoring', desc: 'Continuous monitoring for chronic conditions.' }
            ];

            return (
                <section className="py-20 px-4 max-w-6xl mx-auto">
                    <div className="text-center mb-16">
                        <h2 className="text-4xl font-bold mb-4">Our Core <span className="text-gradient">Medical Services</span></h2>
                        <p className="text-gray-500 max-w-xl mx-auto">We bring the entire clinic to your living room with specialized home healthcare solutions.</p>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
                        {services.map((s, i) => (
                            <motion.div 
                                key={i}
                                whileHover={{ y: -10 }}
                                className="glass-card p-8 text-center hover:border-[#0077b6]/30 transition-all cursor-default"
                            >
                                <div className="bg-[#90e0ef]/30 text-[#0077b6] w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-6">
                                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4.8 2.3A.3.3 0 1 0 5 2a.3.3 0 0 0-.2.3Z"/><path d="M10 22v-6.5a2.5 2.5 0 0 0-5 0V22"/><path d="M14 11h3a2 2 0 0 1 2 2v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"/><path d="M12 2v9"/><path d="m8 6 4-4 4 4"/></svg>
                                </div>
                                <h3 className="text-xl font-bold mb-3">{s.title}</h3>
                                <p className="text-gray-500 text-sm">{s.desc}</p>
                            </motion.div>
                        ))}
                    </div>
                </section>
            );
        };

        const App = () => {
            useEffect(() => {
                lucide.createIcons();
            }, []);

            return (
                <div className="min-h-screen bg-[#f8f9fa]">
                    <Navbar />
                    <Hero />
                    <Services />
                    
                    <section className="bg-slate-100 py-20">
                        <div className="max-w-6xl mx-auto px-4 text-center">
                            <h2 className="text-4xl font-bold mb-12">How It <span className="text-gradient">Works</span></h2>
                            <div className="grid grid-cols-1 md:grid-cols-4 gap-8">
                                {[
                                    { t: 'Request Service', d: 'Choose your service and time.' },
                                    { t: 'Get Matched', d: 'Connect with a pro nearby.' },
                                    { t: 'Home Visit', d: 'Receive care at home.' },
                                    { t: 'Stay Connected', d: 'Follow-up via live chat.' }
                                ].map((step, i) => (
                                    <div key={i} className="relative">
                                        <div className="w-12 h-12 bg-[#0077b6] text-white rounded-full flex items-center justify-center text-xl font-bold mx-auto mb-4 shadow-lg">
                                            {i + 1}
                                        </div>
                                        <h3 className="font-bold mb-2">{step.t}</h3>
                                        <p className="text-sm text-gray-500">{step.d}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    <footer className="bg-[#03045e] text-white py-16 px-4">
                        <div className="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-4 gap-12 opacity-80">
                            <div>
                                <h3 className="text-2xl font-bold mb-6 text-white">MedLink</h3>
                                <p className="text-sm leading-relaxed">Bringing premium healthcare directly to your home. Reducing hospital stress, one visit at a time.</p>
                            </div>
                            <div>
                                <h4 className="font-bold mb-4 text-white">Services</h4>
                                <div className="flex flex-col gap-2 text-sm">
                                    <span>General Consultations</span>
                                    <span>Nursing Care</span>
                                    <span>Wound Dressing</span>
                                </div>
                            </div>
                            <div>
                                <h4 className="font-bold mb-4 text-white">Support</h4>
                                <div className="flex flex-col gap-2 text-sm">
                                    <span>Help Center</span>
                                    <span>Contact Us</span>
                                    <span>Privacy Policy</span>
                                </div>
                            </div>
                            <div>
                                <h4 className="font-bold mb-4 text-white">Contact</h4>
                                <p className="text-sm">support@medlink.com</p>
                                <p className="text-sm">123 Health Ave, Wellness City</p>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
